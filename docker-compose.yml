version: '3.8'

services:
  backend:
    build: .
    container_name: project_talk_backend
    ports:
      - "8001:8001"
    volumes:
      - ./backend:/app/backend
      - ./backend/chat_data.json:/app/backend/chat_data.json
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    networks:
      - project_talk_network

  frontend:
    image: python:3.9-slim
    container_name: project_talk_frontend
    working_dir: /app/frontend
    ports:
      - "8080:8080"
    volumes:
      - ./frontend:/app/frontend
    command: python -m http.server 8080
    restart: unless-stopped
    networks:
      - project_talk_network
    depends_on:
      - backend

networks:
  project_talk_network:
    driver: bridge

volumes:
  chat_data: